<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIU Quechua - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: linear-gradient(180deg,#eef2ff,#f4f6f9); }
    .auth-card { max-width: 920px; margin: 48px auto; }
    .auth-split { min-height: 420px; }
    .form-small { font-size: .95rem; }
    .avatar-preview { width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid #e9ecef }
  </style>
</head>
<body>

  <div class="container auth-card">
    <div class="card shadow-sm">
      <div class="row g-0 auth-split">
        <div class="col-md-6 p-4">
          <h4 class="mb-3">Ingresar</h4>
          <form id="login-form">
            <div class="mb-2">
              <label class="form-label">Usuario</label>
              <input id="login-username" class="form-control form-small" autocomplete="username">
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input id="login-password" type="password" class="form-control form-small" autocomplete="current-password">
            </div>
            <div class="d-grid gap-2">
              <button id="login-btn" class="btn btn-gradient">Entrar</button>
              <a href="#register" id="show-register" class="btn btn-outline-secondary">Crear cuenta</a>
            </div>
            <div id="login-feedback" class="mt-3"></div>
          </form>
        </div>
        <div class="col-md-6 bg-white p-4">
          <h4 class="mb-3">Registro rápido</h4>
          <form id="register-form">
            <div class="d-flex align-items-center mb-3 gap-3">
              <img id="reg-avatar-preview" class="avatar-preview" src="imgs/avatar-placeholder.png" alt="avatar">
              <div>
                <label class="form-label small">Foto (opcional)</label>
                <input id="reg-photo" type="file" accept="image/*" class="form-control form-control-sm">
              </div>
            </div>
            <div class="mb-2">
              <label class="form-label">Nombre completo</label>
              <input id="reg-name" class="form-control form-small">
            </div>
            <div class="mb-2">
              <label class="form-label">Email</label>
              <input id="reg-email" type="email" class="form-control form-small">
            </div>
            <div class="mb-2">
              <label class="form-label">Usuario</label>
              <input id="reg-username" class="form-control form-small">
            </div>
            <div class="mb-2">
              <label class="form-label">Contraseña</label>
              <input id="reg-password" type="password" class="form-control form-small">
            </div>
            <div class="mb-3">
              <div class="alert alert-info py-2 small mb-0">Registro público solo crea cuentas de alumno. Las cuentas de profesor se gestionan desde el panel docente.</div>
            </div>
            <div class="d-grid">
              <button id="register-btn" class="btn btn-outline-primary">Registrar y Entrar</button>
            </div>
            <div id="reg-feedback" class="mt-2 small text-muted"></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="clases/auth.js"></script>
</body>
</html>
